# ============================================================
# pre-commit configuration
# ============================================================
# Runs automated quality checks before every commit.
# Install with:  pre-commit install
# Run manually:  pre-commit run --all-files
# Update hooks:  pre-commit autoupdate
# ============================================================

# Default Python version for hooks that need it
default_language_version:
  python: python3

# Skip these stages by default — we only run on commit
default_stages: [pre-commit]

# Don't fail the commit just because pre-commit can't reach the internet
fail_fast: false

repos:
  # ----- Generic file hygiene -----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key

  # ----- Secrets scanning -----
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.0
    hooks:
      - id: gitleaks

  # ----- Terraform-specific hooks -----
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.2
    hooks:
      # Auto-format all .tf files
      - id: terraform_fmt

      # Validate Terraform syntax & types
      - id: terraform_validate
        args:
          - --tf-init-args=-backend=false

      # Lint with tflint (uses .tflint.hcl)
      - id: terraform_tflint
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl

      # Static security scan with trivy
      # Bootstrap is excluded — its findings are accepted in ADR-001
      - id: terraform_trivy
        exclude: ^infra/bootstrap/

      # Auto-generate module docs (writes a Terraform-docs section into README.md)
      - id: terraform_docs
        args:
          - --hook-config=--path-to-file=README.md
          - --hook-config=--add-to-existing-file=true
          - --hook-config=--create-file-if-not-exist=true
